# Import all controllers with Route attributes
controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute

# Manual User Routes
user_dashboard:
    path: /user
    controller: App\Controller\UserController::dashboard
    methods: [GET]

user_profile:
    path: /user/profile
    controller: App\Controller\UserController::profile
    methods: [GET]

user_profile_edit:
    path: /user/profile/edit
    controller: App\Controller\UserController::profileEdit
    methods: [GET, POST]

# Manual Coach Routes
coach_dashboard:
    path: /coach
    controller: App\Controller\CoachController::dashboard
    methods: [GET]

coach_profile:
    path: /coach/profile
    controller: App\Controller\CoachController::profile
    methods: [GET]

coach_profile_edit:
    path: /coach/profile/edit
    controller: App\Controller\CoachController::profileEdit
    methods: [GET, POST]

# Comment Routes
comment_create:
    path: /comments/create/{postId}
    controller: App\Controller\CommentController::create
    methods: POST

comment_delete:
    path: /comments/{id}/delete
    controller: App\Controller\CommentController::delete
    methods: POST

comment_edit:
    path: /comments/{id}/edit
    controller: App\Controller\CommentController::edit
    methods: POST

# Post Routes (Front-End) - FIXED WITH /posts PREFIX
posts_list:
    path: /posts
    controller: App\Controller\PostController::index
    methods: GET

post_create:
    path: /posts/create
    controller: App\Controller\PostController::create
    methods: POST

post_details:
    path: /posts/{id}
    controller: App\Controller\PostController::show
    methods: GET
    requirements:
        id: '\d+'

post_edit:
    path: /posts/{id}/edit
    controller: App\Controller\PostController::edit
    methods: POST
    requirements:
        id: '\d+'

post_delete:
    path: /posts/{id}/delete
    controller: App\Controller\PostController::delete
    methods: POST
    requirements:
        id: '\d+'

post_like:
    path: /posts/{id}/like
    controller: App\Controller\PostController::like
    methods: POST
    requirements:
        id: '\d+'