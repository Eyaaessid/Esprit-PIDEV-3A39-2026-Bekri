# Import all controllers with Route attributes
controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute

# Manual User Routes
user_dashboard:
    path: /user
    controller: App\Controller\UserController::dashboard
    methods: [GET]

user_profile:
    path: /user/profile
    controller: App\Controller\UserController::profile
    methods: [GET]

user_profile_edit:
    path: /user/profile/edit
    controller: App\Controller\UserController::profileEdit
    methods: [GET, POST]

# Manual Coach Routes
coach_dashboard:
    path: /coach
    controller: App\Controller\CoachController::dashboard
    methods: [GET]

coach_profile:
    path: /coach/profile
    controller: App\Controller\CoachController::profile
    methods: [GET]

coach_profile_edit:
    path: /coach/profile/edit
    controller: App\Controller\CoachController::profileEdit
    methods: [GET, POST]